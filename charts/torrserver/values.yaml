# Default values for torrserver.
#
# Gateway API HTTPRoute (optional): set httpRoute.enabled and parentRefs + hostnames.
# For local-k8s + Envoy Gateway, see helm/torrserver-values.yaml in this repo.

replicaCount: 1

image:
  repository: ghcr.io/yourok/torrserver
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# TorrServer configuration via environment variables
config:
  # HTTP Basic Auth (requires accs.db in config dir)
  httpAuth: false
  # Read-only DB mode
  readOnlyDb: false
  # Don't kill server on signal
  dontKill: true
  # Server port (default 8090)
  port: 8090
  # Override config path inside container
  confPath: "/opt/ts/config"
  # Override torrents directory
  torrDir: "/opt/ts/torrents"
  # Override log path (empty = stdout)
  logPath: ""

# SSL configuration (optional)
ssl:
  enabled: false
  port: 8091
  # Provide existing secret with tls.crt and tls.key
  existingSecret: ""

# Persistence for /opt/ts (config + torrents cache)
persistence:
  enabled: true
  # config volume
  config:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
    existingClaim: ""
    mountPath: /opt/ts/config
  # torrents cache / data volume
  data:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 20Gi
    existingClaim: ""
    mountPath: /opt/ts/torrents

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automount: true

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8090
  # Expose raw torrent client port (optional)
  torrentPort:
    enabled: true
    port: 32000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: torrserver.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: torrserver-tls
  #    hosts:
  #      - torrserver.example.com

# Gateway API (HTTPRoute) — attach to an existing Gateway; backend is this chart's Service.
httpRoute:
  enabled: false
  # HTTPRoute metadata.name (defaults to fullname, e.g. release "torrserver" → torrserver)
  name: ""
  annotations: {}
  # parentRefs required when enabled (Gateway must allow routes from this namespace)
  parentRefs: []
  # - group: gateway.networking.k8s.io
  #   kind: Gateway
  #   name: my-gateway
  #   namespace: my-gw-namespace
  #   sectionName: http
  hostnames: []
  # If non-empty, replaces the default single rule (path / → Service). Use full rule objects.
  rules: []

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

livenessProbe:
  httpGet:
    path: /echo
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /echo
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Extra environment variables
extraEnv: []
# - name: MY_VAR
#   value: "my-value"

# Extra volumes to mount
extraVolumes: []
extraVolumeMounts: []
